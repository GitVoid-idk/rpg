<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Diário da Campanha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root{
    --ink-900:#12151c;
    --ink-800:#1c212c;
    --ink-700:#272e3b;
    --parchment:#f2e8d0;
    --parchment-dim:#e9ddc0;
    --ember:#c1553c;
    --gold:#c9a227;
    --text-ink:#2a241c;
    --text-pale:#cfc9bb;
    --text-faint:#8b8b7f;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:
      radial-gradient(circle at 15% 0%, #1a2130 0%, transparent 55%),
      radial-gradient(circle at 85% 100%, #1a1e26 0%, transparent 55%),
      var(--ink-900);
    color:var(--text-pale);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
  }

  #login{flex:1; display:flex; align-items:center; justify-content:center; padding:24px;}
  .login-card{
    background:var(--ink-800); border:1px solid #333c4d;
    border-radius:6px 14px 6px 14px; padding:40px 36px;
    width:100%; max-width:380px; box-shadow:0 20px 60px rgba(0,0,0,.5);
  }
  .login-card h1{
    font-family:'Cormorant Garamond',serif; font-weight:600; font-size:2.2rem;
    margin:0 0 4px; color:var(--parchment); letter-spacing:.3px;
  }
  .login-card p.sub{margin:0 0 28px; font-size:.85rem; color:var(--text-faint);}
  #connStatus{margin:0 0 18px; font-size:.72rem; color:var(--text-faint);}
  #connStatus.ok{color:#7fae6b;}
  #connStatus.err{color:var(--ember);}
  label{
    display:block; font-size:.72rem; text-transform:uppercase; letter-spacing:.08em;
    color:var(--text-faint); margin-bottom:6px; margin-top:18px;
  }
  input[type=text]{
    width:100%; background:var(--ink-900); border:1px solid #3a4356;
    color:var(--text-pale); padding:11px 12px; border-radius:4px;
    font-family:'Inter',sans-serif; font-size:.95rem;
  }
  input[type=text]:focus{outline:1px solid var(--gold); border-color:var(--gold);}
  .role-choice{display:flex; gap:10px; margin-top:6px;}
  .role-btn{
    flex:1; background:var(--ink-900); border:1px solid #3a4356; color:var(--text-pale);
    padding:12px 10px; border-radius:4px; cursor:pointer; font-size:.85rem;
    font-family:'Inter',sans-serif; transition:.15s; text-align:center;
  }
  .role-btn.active{border-color:var(--gold); color:var(--gold); background:#242315;}
  .enter-btn{
    margin-top:26px; width:100%; padding:13px; border:none; border-radius:4px;
    background:var(--gold); color:#1c1608; font-weight:600; font-size:.9rem; cursor:pointer;
    letter-spacing:.02em;
  }
  .enter-btn:disabled{opacity:.4; cursor:not-allowed;}
  .enter-btn:not(:disabled):hover{filter:brightness(1.08);}

  #app{display:none; flex:1; flex-direction:column; height:100vh;}
  header.bar{
    display:flex; align-items:center; justify-content:space-between; padding:14px 22px;
    border-bottom:1px solid #262c38; background:rgba(18,21,28,.85); backdrop-filter:blur(6px);
    position:sticky; top:0; z-index:5;
  }
  header.bar h1{font-family:'Cormorant Garamond',serif; font-weight:600; font-size:1.4rem; color:var(--parchment); margin:0;}
  .whoami{font-size:.75rem; color:var(--text-faint);}
  .whoami b{color:var(--gold); font-weight:600;}

  #log{
    flex:1; overflow-y:auto; padding:26px 18px 120px; display:flex; flex-direction:column;
    gap:16px; max-width:720px; margin:0 auto; width:100%;
  }
  .empty-log{text-align:center; color:var(--text-faint); font-size:.9rem; margin-top:60px; font-style:italic;}

  .entry{max-width:88%;}
  .entry .meta{
    font-family:'JetBrains Mono',monospace; font-size:.68rem; color:var(--text-faint);
    margin-bottom:5px; display:flex; gap:8px; align-items:center;
  }

  .entry.narracao{align-self:stretch; max-width:100%;}
  .entry.narracao .card{
    background:var(--parchment); color:var(--text-ink); border-radius:3px 10px 3px 10px;
    padding:18px 20px; box-shadow:0 6px 18px rgba(0,0,0,.35); font-family:'Cormorant Garamond',serif;
    font-size:1.18rem; line-height:1.5; border-left:3px solid var(--gold);
  }

  .entry.acao{align-self:flex-end;}
  .entry.acao .card{
    background:var(--parchment-dim); color:var(--text-ink); border-radius:9px 3px 9px 3px;
    padding:13px 16px; font-size:.92rem; line-height:1.45; box-shadow:0 4px 12px rgba(0,0,0,.3);
    transform:rotate(-.4deg); border:1px dashed #b8ab84;
  }
  .entry.acao .meta{justify-content:flex-end;}

  .entry.rolagem{align-self:center; max-width:60%;}
  .entry.rolagem .card{
    background:var(--ink-700); border:1px solid #3a4356; border-radius:8px; padding:12px 18px;
    text-align:center; display:flex; align-items:center; gap:12px; justify-content:center;
  }
  .roll-num{font-family:'JetBrains Mono',monospace; font-weight:600; font-size:1.5rem; color:var(--text-pale);}
  .roll-num.crit20{color:var(--gold); text-shadow:0 0 14px rgba(201,162,39,.6);}
  .roll-num.crit1{color:var(--ember); text-shadow:0 0 14px rgba(193,85,60,.5);}
  .roll-tag{font-size:.68rem; letter-spacing:.06em; text-transform:uppercase; color:var(--text-faint);}
  .roll-tag.crit20{color:var(--gold);}
  .roll-tag.crit1{color:var(--ember);}

  #composer{
    position:sticky; bottom:0; border-top:1px solid #262c38; background:rgba(18,21,28,.92);
    backdrop-filter:blur(8px); padding:14px 18px 18px;
  }
  .composer-inner{max-width:720px; margin:0 auto; display:flex; gap:10px; align-items:flex-end;}
  textarea{
    flex:1; resize:none; background:var(--ink-800); border:1px solid #3a4356; color:var(--text-pale);
    padding:11px 13px; border-radius:6px; font-family:'Inter',sans-serif; font-size:.92rem;
    min-height:44px; max-height:120px;
  }
  textarea:focus{outline:none; border-color:var(--gold);}
  .send-btn{
    background:var(--gold); color:#1c1608; border:none; padding:12px 18px; border-radius:6px;
    font-weight:600; font-size:.85rem; cursor:pointer; white-space:nowrap;
  }
  .send-btn:hover{filter:brightness(1.08);}
  .send-btn:disabled{opacity:.35; cursor:not-allowed;}

  .die-btn{
    width:52px; height:52px; background:var(--ink-700); border:1px solid var(--gold); cursor:pointer;
    position:relative; clip-path:polygon(50% 2%,95% 27%,95% 73%,50% 98%,5% 73%,5% 27%);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .die-btn span{font-family:'JetBrains Mono',monospace; font-size:.72rem; color:var(--gold); font-weight:600;}
  .die-btn.rolling{animation:tumble .6s ease-out;}
  @keyframes tumble{
    0%{transform:rotate(0deg) scale(1);}
    30%{transform:rotate(160deg) scale(1.15);}
    60%{transform:rotate(300deg) scale(.92);}
    100%{transform:rotate(360deg) scale(1);}
  }
  .die-btn:disabled{opacity:.5; cursor:not-allowed;}

  ::-webkit-scrollbar{width:8px;}
  ::-webkit-scrollbar-thumb{background:#333c4d; border-radius:4px;}
</style>
</head>
<body>

<div id="login">
  <div class="login-card">
    <h1>Diário da Campanha</h1>
    <p class="sub">Entre para acompanhar o que acontece na mesa.</p>
    <div id="connStatus">conectando ao servidor...</div>
    <label>Seu nome</label>
    <input type="text" id="nameInput" placeholder="Ex: Miguel" maxlength="30">
    <label>Você é</label>
    <div class="role-choice">
      <button type="button" class="role-btn active" data-role="jogador">Jogador</button>
      <button type="button" class="role-btn" data-role="mestre">Mestre</button>
    </div>
    <button class="enter-btn" id="enterBtn" disabled>Entrar na mesa</button>
  </div>
</div>

<div id="app">
  <header class="bar">
    <h1>Diário da Campanha</h1>
    <div class="whoami">Você é <b id="whoRole"></b> — <span id="whoName"></span></div>
  </header>

  <div id="log"><div class="empty-log">A campanha ainda não começou. Aguardando o mestre narrar a cena de abertura...</div></div>

  <div id="composer">
    <div class="composer-inner">
      <textarea id="textInput" placeholder="Escreva..." rows="1"></textarea>
      <button class="die-btn" id="dieBtn" title="Rolar D20"><span>D20</span></button>
      <button class="send-btn" id="sendBtn">Enviar</button>
    </div>
  </div>
</div>

<script>
let user = null;
let selectedRole = 'jogador';
const socket = io();

const connStatus = document.getElementById('connStatus');
const enterBtn = document.getElementById('enterBtn');

socket.on('connect', () => {
  connStatus.textContent = 'conectado ao servidor';
  connStatus.className = 'ok';
  enterBtn.disabled = false;
});
socket.on('disconnect', () => {
  connStatus.textContent = 'conexão perdida — tentando reconectar...';
  connStatus.className = 'err';
  enterBtn.disabled = true;
});
socket.on('connect_error', () => {
  connStatus.textContent = 'não foi possível conectar ao servidor';
  connStatus.className = 'err';
});

document.querySelectorAll('.role-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    selectedRole = btn.dataset.role;
  });
});

document.getElementById('enterBtn').addEventListener('click', enterTable);
document.getElementById('nameInput').addEventListener('keydown', e=>{
  if(e.key==='Enter') enterTable();
});

function enterTable(){
  const name = document.getElementById('nameInput').value.trim();
  if(!name) return;
  user = {name, role: selectedRole};

  socket.emit('join', {name: user.name, role: user.role});

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('whoRole').textContent = user.role === 'mestre' ? 'Mestre' : 'Jogador';
  document.getElementById('whoName').textContent = user.name;

  const textInput = document.getElementById('textInput');
  textInput.placeholder = user.role === 'mestre'
    ? 'Narre o que acontece na cena...'
    : 'Escreva o que você vai fazer...';
}

let entries = [];

socket.on('history', (data) => {
  entries = data;
  render();
});

socket.on('new_entry', (entry) => {
  entries.push(entry);
  render();
});

function render(){
  const log = document.getElementById('log');
  if(entries.length===0){
    log.innerHTML = '<div class="empty-log">A campanha ainda não começou. Aguardando o mestre narrar a cena de abertura...</div>';
    return;
  }
  log.innerHTML = entries.map(renderEntry).join('');
  log.scrollTop = log.scrollHeight;
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function renderEntry(e){
  const time = new Date(e.ts).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  if(e.type==='narracao'){
    return `<div class="entry narracao">
      <div class="meta">🕯️ ${esc(e.author)} — Mestre · ${time}</div>
      <div class="card">${esc(e.text)}</div>
    </div>`;
  }
  if(e.type==='acao'){
    return `<div class="entry acao">
      <div class="meta">${esc(e.author)} · ${time}</div>
      <div class="card">${esc(e.text)}</div>
    </div>`;
  }
  if(e.type==='rolagem'){
    const critClass = e.roll===20 ? 'crit20' : (e.roll===1 ? 'crit1' : '');
    const tag = e.roll===20 ? 'Crítico!' : (e.roll===1 ? 'Falha crítica' : 'D20');
    return `<div class="entry rolagem">
      <div class="card">
        <div class="roll-num ${critClass}">${e.roll}</div>
        <div>
          <div class="roll-tag ${critClass}">${tag}</div>
          <div class="meta" style="margin:0;">${esc(e.author)} rolou · ${time}</div>
        </div>
      </div>
    </div>`;
  }
  return '';
}

document.getElementById('sendBtn').addEventListener('click', sendText);
document.getElementById('textInput').addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    sendText();
  }
});

function sendText(){
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if(!text || !user) return;
  socket.emit('send_message', {text});
  input.value='';
}

document.getElementById('dieBtn').addEventListener('click', async ()=>{
  if(!user) return;
  const btn = document.getElementById('dieBtn');
  btn.disabled = true;
  btn.classList.add('rolling');
  await new Promise(r=>setTimeout(r,600));
  btn.classList.remove('rolling');
  socket.emit('roll_dice', {});
  btn.disabled = false;
});
</script>
</body>
</html>
